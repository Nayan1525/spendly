version: "3.9"

services:

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  init-aws:
    image: amazon/aws-cli
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name doc-queue &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name doc-dlq &&
        aws --endpoint-url=http://localstack:4566 s3 mb s3://doc-bucket &&
        echo 'AWS resources created.'
      "

  doc-processor:
    build: .
    ports:
      - "5002:5002"
    depends_on:
      localstack:
        condition: service_healthy
      init-aws:
        condition: service_completed_successfully
    environment:
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/doc-queue
      - SQS_DLQ_URL=http://localstack:4566/000000000000/doc-dlq
      - S3_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - ENV=development
      - LOG_LEVEL=INFO
      - DB_PATH=/data/documents.db
    volumes:
      - doc-data:/data

volumes:
  doc-data:
