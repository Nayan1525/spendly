{% extends "base.html" %}

{% block title %}Expense Queued — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Expense Queued</h1>
            <p class="auth-subtitle">Your expense is on its way</p>
        </div>

        <div class="auth-card queued-card">
            <p class="queued-body">
                Your expense has been queued for processing and will appear on your profile shortly.
            </p>
            <div class="queued-actions">
                <a href="{{ url_for('profile') }}" class="btn-submit btn-submit--inline">
                    Back to profile
                </a>
                <a href="{{ url_for('add_expense') }}" class="btn-ghost">
                    Add another
                </a>
            </div>
        </div>

    </div>
</section>

{% endblock %}
